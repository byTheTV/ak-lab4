name: sort
source: |
  (progn
    (setq input_done 0)
    (setq got_n 0)
    (setq count 0)
    (setq n 0)
    (setq run 1)
    (setq swapped 0)
    (setq i 0)
    (setq k 0)
    (ei)
    (loop (eq input_done 0) (nop))
    (if (> n 1)
        (loop (eq run 1)
          (progn
            (setq swapped 0)
            (setq i 0)
            (loop (< (+ i 1) n)
              (progn
                (if (> (load (+ 128 i)) (load (+ 128 (+ i 1))))
                    (progn
                      (setq t (load (+ 128 i)))
                      (store (+ 128 i) (load (+ 128 (+ i 1))))
                      (store (+ 128 (+ i 1)) t)
                      (setq swapped 1))
                    0)
                (setq i (+ i 1))))
            (if (eq swapped 0) (setq run 0) 0)))
        0)
    (setq k 0)
    (loop (< k n)
      (progn
        (out (load (+ 128 k)))
        (setq k (+ k 1)))))

  (interrupt 0
    (progn
      (setq ch (in))
      (if (= got_n 0)
          (progn (setq n ch) (setq got_n 1))
          (progn
            (store (+ 128 count) ch)
            (setq count (+ count 1))
            (if (= count n) (setq input_done 1) 0)))))
