name: hello_user_name
source: |
  (defun emit-ch-at (base idx)
    (out (load (+ (+ base 1) idx))))

  (defun emit-pstr-rec (base idx)
    (if (< idx (load base))
        (progn
          (emit-ch-at base idx)
          (emit-pstr-rec base (+ idx 1)))
        0))

  (defun emit-pstr (base)
    (emit-pstr-rec base 0))

  (progn
    (setq done 0)
    (setq name_len 0)
    (setq name_addr 100)
    (emit-pstr "What is your name?\n")
    (ei)
    (loop (eq done 0) (nop))
    (store name_addr name_len)
    (emit-pstr "Hello, ")
    (emit-pstr name_addr)
    (emit-pstr "!\n"))

  (interrupt 0
    (progn
      (setq ch (in))
      (if (= ch 10)
          (setq done 1)
          (progn
            (store (+ name_addr (+ name_len 1)) ch)
            (setq name_len (+ name_len 1))))))
