# Обязательные проверки из ТЗ (lab4-task.md): ruff (lint + format), mypy, pytest.
# GitHub → Rules / Branch protection → required checks: ruff, mypy, pytest
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Mypy
        run: python -m mypy

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    # Чтобы публикация JUnit создавала check «Test Results» на странице workflow
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Pytest
        run: |
          python -m pytest \
            -v -ra --tb=short \
            --junitxml=junit.xml -o junit_family=xunit2 \
            --cov=ak_lab4 --cov-report=xml --cov-report=term-missing:skip-covered

      # Отчёт в интерфейсе GitHub: вкладка run → слева check «Test Results» (не только ZIP)
      - name: Publish test results (JUnit → GitHub Checks)
        if: always() && hashFiles('junit.xml') != ''
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          check_name: Test Results
          comment_mode: off

      - name: Job summary
        if: always()
        run: |
          echo "## Тесты и покрытие" >> "$GITHUB_STEP_SUMMARY"
          echo "- В этом же run открой check **Test Results** — таблица тестов pass/fail." >> "$GITHUB_STEP_SUMMARY"
          echo "- Подробный лог pytest (в т.ч. coverage в консоли) — шаг **Pytest** выше." >> "$GITHUB_STEP_SUMMARY"
          echo "- Сырые XML: артефакты **junit** и **coverage-xml**." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml
          if-no-files-found: ignore

      - name: Upload coverage (Cobertura XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
