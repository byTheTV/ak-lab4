# Обязательные проверки из ТЗ (lab4-task.md): ruff (lint + format), mypy, pytest.
# GitHub → Rules / Branch protection → required checks: ruff, mypy, pytest
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check src tests

      - name: Ruff format
        run: python -m ruff format --check src tests

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Mypy
        run: python -m mypy

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    # Чтобы публикация JUnit создавала check «Test Results» на странице workflow
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Pytest
        run: |
          python -m pytest \
            -v -ra --tb=short \
            --junitxml=junit.xml -o junit_family=xunit2 \
            --cov=ak_lab4 --cov-report=xml --cov-report=term-missing:skip-covered

      # Отчёт в интерфейсе GitHub: вкладка run → слева check «Test Results» (не только ZIP)
      - name: Publish test results (JUnit → GitHub Checks)
        if: always() && hashFiles('junit.xml') != ''
        continue-on-error: true
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml
          check_name: Test Results
          comment_mode: off

      - name: Job summary (покрытие + ссылки на checks)
        if: always()
        env:
          COMMIT_CHECKS_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}/checks
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          echo "## Покрытие кода" >> "$GITHUB_STEP_SUMMARY"
          echo "Таблица из \`coverage.py\` после шага **Pytest** (без скачивания артефакта)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f .coverage ]; then
            python -m coverage report --format=markdown --skip-covered >> "$GITHUB_STEP_SUMMARY" 2>&1
            cov_st=$?
            if [ "$cov_st" != 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "_Не удалось вывести \`coverage report\` (код $cov_st)._ " >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "_Нет файла \`.coverage\` — pytest не записал данные покрытия._" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "## Тесты (JUnit)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Отдельный check **Test Results** не внутри этого блока: он вешается на коммит. Открой: [Checks для этого коммита]($COMMIT_CHECKS_URL) и найди **Test Results** в списке." >> "$GITHUB_STEP_SUMMARY"
          echo "- Или открой [эту страницу run]($RUN_URL) → слева список jobs / проверок для коммита." >> "$GITHUB_STEP_SUMMARY"
          echo "- Сырые XML: артефакты **junit** и **coverage-xml**." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: junit.xml
          if-no-files-found: ignore

      - name: Upload coverage (Cobertura XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
